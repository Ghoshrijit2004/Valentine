<!-- updated -->
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<!-- IMPORTANT FOR MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Love ❤️</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

/* container */

.container{
padding:20px;
max-width:420px;
margin:auto;
}

/* envelope */

#envelope{
font-size:90px;
cursor:pointer;
margin-top:120px;
}

/* quiz */

#quiz{
display:none;
margin-top:20px;
}

.question{
margin:20px 0;
}

button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.correct{
background:#00c853;
color:white;
}

.wrong{
background:#d50000;
color:white;
}

/* slideshow */

#slideshow{
display:none;
margin-top:20px;
}

#photo{
width:100%;
max-width:280px;
height:auto;
border-radius:20px;
}

/* proposal */

#proposal{
display:none;
margin-top:20px;
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:white;
color:black;
}

/* ring */

#ring{
font-size:80px;
display:none;
animation:ring 2s infinite;
margin-top:10px;
}

@keyframes ring{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* fireworks */

.spark{
position:fixed;
font-size:22px;
animation:explode 1.2s forwards;
}

@keyframes explode{
0%{transform:scale(0)}
100%{transform:scale(3);opacity:0}
}

#final{
font-size:28px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div id="envelope">💌</div>

<audio id="music" loop>
<source src="love.mp3">
</audio>

<!-- QUIZ -->

<div id="quiz">

<h2>How well do you know your partner? 💖</h2>

<div class="question">
Favourite color?<br>
<button onclick="check(this,false)">Blue</button>
<button onclick="check(this,true)">Black</button>
<button onclick="check(this,false)">Red</button>
</div>

<div class="question">
Favourite food?<br>
<button onclick="check(this,true)">Biriyani</button>
<button onclick="check(this,false)">Plain Rice</button>
<button onclick="check(this,false)">Fried Rice</button>
</div>

<div class="question">
Favourite singer?<br>
<button onclick="check(this,false)">Arijit</button>
<button onclick="check(this,false)">Shreya</button>
<button onclick="check(this,true)">Sonu Nigam</button>
</div>

<div class="question">
What name does he call his wife?<br>
<button onclick="check(this,false)">Ishani</button>
<button onclick="check(this,false)">Baby</button>
<button onclick="check(this,true)">Sonai</button>
</div>

<div class="question">
Relationship started?<br>
<button onclick="check(this,true)">7 Sep</button>
<button onclick="check(this,false)">22 Dec</button>
<button onclick="check(this,false)">11 July</button>
</div>

<div class="question">
His birthday?<br>
<button onclick="check(this,true)">10 June</button>
<button onclick="check(this,false)">1 Feb</button>
<button onclick="check(this,false)">15 Dec</button>
</div>

<button onclick="finishQuiz()">Submit</button>

</div>

<!-- SLIDESHOW -->

<div id="slideshow">
<img id="photo" src="photo1.jpg">
</div>

<!-- PROPOSAL -->

<div id="proposal">

<h2 id="question">Will You Be My Valentine?</h2>

<div id="buttons">
<button class="yes" onclick="yesClick()">YES 💖</button>
<button class="no" onmouseover="escapeBtn(this)">NO</button>
</div>

<div id="ring">💍</div>

<div id="final"></div>

</div>

</div>

<script>

/* envelope click */

document.getElementById("envelope").onclick=function(){

this.style.display="none";

document.getElementById("quiz").style.display="block";

document.getElementById("music").play();

};

/* quiz */

let score=0;

function check(btn,isCorrect){

if(isCorrect){
btn.classList.add("correct");
score++;
}else{
btn.classList.add("wrong");
}

}

/* finish quiz */

function finishQuiz(){

if(score>=4){

document.getElementById("quiz").style.display="none";
document.getElementById("slideshow").style.display="block";
document.getElementById("proposal").style.display="block";

}else{

alert("You need to know your partner better 😄");

}

}

/* slideshow */

const photos=["photo1.jpg","photo2.jpg","photo3.jpg"];

let p=0;

setInterval(()=>{

p=(p+1)%photos.length;

document.getElementById("photo").src=photos[p];

},2500);

/* escape NO */

function escapeBtn(btn){

btn.style.position="absolute";

btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";

}

/* fireworks */

function fireworks(){

for(let i=0;i<70;i++){

const s=document.createElement("div");

s.className="spark";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

setTimeout(()=>s.remove(),1200);

}

}

/* YES */

function yesClick(){

document.getElementById("question").style.display="none";
document.getElementById("buttons").style.display="none";

document.getElementById("ring").style.display="block";

document.getElementById("final").innerHTML="Rijit ❤️ Ishani";

fireworks();

}

</script>

</body>
</html>
