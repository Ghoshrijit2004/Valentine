<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

#canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#envelope{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
cursor:pointer;
}

/* quiz */

#quiz{
display:none;
position:absolute;
top:80px;
width:100%;
}

.question{
margin:15px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:20px;
cursor:pointer;
}

.correct{
background:#00c853;
color:white;
}

.wrong{
background:#d50000;
color:white;
}

/* slideshow */

#slideshow{
display:none;
position:absolute;
bottom:260px;
width:100%;
}

#photo{
width:260px;
height:auto;
border-radius:20px;
}

/* proposal */

#proposal{
display:none;
position:absolute;
bottom:120px;
width:100%;
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:white;
}

#ring{
font-size:90px;
display:none;
animation:ring 2s infinite;
}

@keyframes ring{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

.spark{
position:absolute;
font-size:24px;
animation:explode 1.2s forwards;
}

@keyframes explode{
0%{transform:scale(0)}
100%{transform:scale(3);opacity:0}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="envelope">💌</div>

<audio id="music" loop>
<source src="love.mp3">
</audio>

<!-- QUIZ -->

<div id="quiz">

<h2>How well do you know your partner? 💖</h2>

<div class="question">
Favourite color?<br>
<button onclick="check(this,false)">Blue</button>
<button onclick="check(this,true)">Black</button>
<button onclick="check(this,false)">Red</button>
</div>

<div class="question">
Favourite food?<br>
<button onclick="check(this,true)">Biriyani</button>
<button onclick="check(this,false)">Plain Rice</button>
<button onclick="check(this,false)">Fried Rice</button>
</div>

<div class="question">
Favourite singer?<br>
<button onclick="check(this,false)">Arijit Singh</button>
<button onclick="check(this,false)">Shreya Ghoshal</button>
<button onclick="check(this,true)">Sonu Nigam</button>
</div>

<div class="question">
What name does he call his wife?<br>
<button onclick="check(this,false)">Ishani</button>
<button onclick="check(this,false)">Baby</button>
<button onclick="check(this,true)">Sonai</button>
</div>

<div class="question">
Relationship started?<br>
<button onclick="check(this,true)">7 Sep</button>
<button onclick="check(this,false)">22 Dec</button>
<button onclick="check(this,false)">11 July</button>
</div>

<div class="question">
His birthday?<br>
<button onclick="check(this,true)">10 June</button>
<button onclick="check(this,false)">1 Feb</button>
<button onclick="check(this,false)">15 Dec</button>
</div>

<br>
<button onclick="finishQuiz()">Submit</button>

</div>

<!-- slideshow -->

<div id="slideshow">
<img id="photo" src="photo1.jpg">
</div>

<!-- proposal -->

<div id="proposal">

<h2 id="question">Will You Be My Valentine?</h2>

<div id="buttons">
<button class="yes" onclick="yesClick()">YES 💖</button>
<button class="no" onmouseover="escapeBtn(this)">NO</button>
</div>

<div id="ring">💍</div>

<div id="final"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

/* envelope click */

document.getElementById("envelope").onclick=function(){

this.style.display="none";

document.getElementById("quiz").style.display="block";

document.getElementById("music").play();

};

/* quiz logic */

let score=0;

function check(btn,isCorrect){

if(isCorrect){
btn.classList.add("correct");
score++;
}else{
btn.classList.add("wrong");
}

}

/* finish quiz */

function finishQuiz(){

if(score>=4){

document.getElementById("quiz").style.display="none";

document.getElementById("slideshow").style.display="block";

document.getElementById("proposal").style.display="block";

}else{

alert("You need to know your partner better 😄");

}

}

/* slideshow */

const photos=["photo1.jpg","photo2.jpg","photo3.jpg"];

let p=0;

setInterval(()=>{

p=(p+1)%photos.length;

document.getElementById("photo").src=photos[p];

},2500);

/* escape NO */

function escapeBtn(btn){

btn.style.position="absolute";

btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";

}

/* fireworks */

function fireworks(){

for(let i=0;i<70;i++){

const s=document.createElement("div");

s.className="spark";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

setTimeout(()=>s.remove(),1200);

}

}

/* yes */

function yesClick(){

document.getElementById("question").style.display="none";
document.getElementById("buttons").style.display="none";

document.getElementById("ring").style.display="block";

document.getElementById("final").innerHTML="Rijit ❤️ Ishani";

fireworks();

}

</script>

</body>
</html>
